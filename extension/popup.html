<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Universal AI Image Enhancer</title>
    <link rel="stylesheet" href="styles/popup.css">
  </head>
  <body>
    <main class="popup-shell">
      <header class="header">
        <div>
          <h1>Universal AI Enhancer</h1>
          <p id="backendStatus" class="status status-muted">Checking backend</p>
        </div>
        <label class="switch" title="Enable or disable image processing">
          <input id="enabledToggle" type="checkbox">
          <span class="switch-track"></span>
        </label>
      </header>

      <section class="controls" aria-label="Enhancement controls">
        <label class="control-label" for="modeSelect">Enhancement mode</label>
        <select id="modeSelect">
          <option value="auto">🤖 Auto Mode</option>
          <option value="manga">📖 Manga Mode</option>
          <option value="artwork">🎨 Anime / Artwork Mode</option>
          <option value="photo">📷 Photo Mode</option>
        </select>
        <div class="range-heading">
          <label class="control-label" for="enhanceLevel">Enhancement strength</label>
          <output id="enhanceLevelValue" for="enhanceLevel">35%</output>
        </div>
        <input id="enhanceLevel" type="range" min="0" max="100" step="5" value="35">
        <p id="modeDescription" class="mode-description"></p>
        <label class="preview-control">
          <input id="previewOriginal" type="checkbox">
          <span>Preview original images</span>
        </label>
      </section>

      <section class="quality-panel" aria-label="Last image quality comparison">
        <span class="stat-label">Last verified result</span>
        <strong id="qualitySummary">No comparison yet</strong>
        <small id="qualityDetails"></small>
      </section>

      <button id="openDashboard" class="dashboard-button" type="button">Open comparison dashboard</button>

      <section class="scope-stats">
        <table>
          <thead><tr><th>Scope</th><th>Seen</th><th>Fixed</th><th>Working</th><th>Error</th><th>Cache</th></tr></thead>
          <tbody>
            <tr data-scope="currentPage"><th>Current</th><td></td><td></td><td></td><td></td><td></td></tr>
            <tr data-scope="openPages"><th>Open tabs</th><td></td><td></td><td></td><td></td><td></td></tr>
            <tr data-scope="lifetime"><th>All time</th><td></td><td></td><td></td><td></td><td></td></tr>
          </tbody>
        </table>
      </section>

      <section class="stats-grid" aria-label="Extension statistics">
        <article class="stat">
          <span class="stat-label">Processed</span>
          <strong id="processedCount">0</strong>
        </article>
        <article class="stat">
          <span class="stat-label">Cache Hits</span>
          <strong id="cacheHitCount">0</strong>
        </article>
        <article class="stat">
          <span class="stat-label">Errors</span>
          <strong id="errorCount">0</strong>
        </article>
        <article class="stat">
          <span class="stat-label">Queue</span>
          <strong id="queueSizeCount">0</strong>
        </article>
        <article class="stat">
          <span class="stat-label">Processing</span>
          <strong id="processingCount">0</strong>
        </article>
        <article class="stat">
          <span class="stat-label">Waiting</span>
          <strong id="waitingCount">0</strong>
        </article>
        <article class="stat">
          <span class="stat-label">Avg Latency</span>
          <strong id="averageLatency">0 ms</strong>
        </article>
        <article class="stat">
          <span class="stat-label">Cache Ratio</span>
          <strong id="cacheHitRatio">0%</strong>
        </article>
      </section>
    </main>
    <script src="src/config.js"></script>
    <script src="src/popup.js"></script>
  </body>
</html>
