<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Universal AI Enhancer Dashboard</title>
    <link rel="stylesheet" href="styles/dashboard.css">
  </head>
  <body>
    <main>
      <header><div><h1>Universal AI Image Enhancer</h1><p>Original versus AI verification</p></div><span id="status">Loading…</span></header>
      <section class="settings card">
        <label>Mode<select id="mode"><option value="auto">Auto</option><option value="manga">Manga</option><option value="artwork">Anime / Artwork</option><option value="photo">Photo</option></select></label>
        <label>Strength <output id="levelValue">35%</output><input id="level" type="range" min="0" max="100" step="5"></label>
        <label>Maximum seconds per image<input id="timeout" type="number" min="5" max="300" step="5" value="60"></label>
        <label>Size mode<select id="sizingMode"><option value="auto">Auto</option><option value="pixel">Manual pixels</option><option value="screen">Screen preset</option></select></label>
        <div id="autoSizePanel" class="setting-mode-panel"><strong>Automatic sizing</strong><small>Uses image position, margins, viewport, screen size and DPR.</small></div>
        <div id="screenSizePanel" class="setting-mode-panel"><label>Quality preset<select id="resolutionPreset"><option value="hd">HD 1280×720</option><option value="fhd">Full HD 1920×1080</option><option value="2k">2K 2560×1440</option><option value="4k">4K 3840×2160</option></select></label><label>Screen orientation<select id="screenOrientation"><option value="auto">Auto</option><option value="landscape">Landscape</option><option value="portrait">Portrait</option></select></label></div>
        <div id="pixelSizePanel" class="setting-mode-panel"><label class="limit-control"><span><input id="maxOutputWidthEnabled" type="checkbox"> Max output width</span><input id="maxOutputWidth" type="number" min="256" max="16383"></label><label class="limit-control"><span><input id="maxOutputHeightEnabled" type="checkbox"> Max output height</span><input id="maxOutputHeight" type="number" min="256" max="16383"></label></div>
        <label class="limit-control"><span><input id="minInputWidthEnabled" type="checkbox"> Min input width</span><input id="minInputWidth" type="number" min="1" max="16383"></label>
        <label class="limit-control"><span><input id="minInputHeightEnabled" type="checkbox"> Min input height</span><input id="minInputHeight" type="number" min="1" max="16383"></label>
        <label class="limit-control"><span><input id="maxInputWidthEnabled" type="checkbox"> Max input width</span><input id="maxInputWidth" type="number" min="1" max="32768"></label>
        <label class="limit-control"><span><input id="maxInputHeightEnabled" type="checkbox"> Max input height</span><input id="maxInputHeight" type="number" min="1" max="32768"></label>
        <label>WebP quality<input id="outputQuality" type="number" min="50" max="100"></label>
        <label>Parallel preprocessing<input id="preprocessingConcurrency" type="number" min="1" max="12"></label>
        <label>Parallel upscale requests<input id="upscaleConcurrency" type="number" min="1" max="2"></label>
        <label><span>Slice long images</span><input id="imageSlicingEnabled" type="checkbox"></label>
        <label>Maximum raw slice height<input id="imageSliceMaxHeight" type="number" min="512" max="8192" step="128"></label>
        <label><span>Performance boost</span><input id="performanceBoost" type="checkbox"></label>
        <label><span>Clean old text before upscale</span><input id="textCleanupEnabled" type="checkbox"></label>
        <label><span>Translate detected text when OCR is available</span><input id="textTranslateEnabled" type="checkbox"></label>
        <label>Source text<select id="textSourceLanguage"><option value="auto">Auto detect</option><option value="en">English</option><option value="vi">Vietnamese</option><option value="ja">Japanese</option><option value="ko">Korean</option><option value="zh">Chinese</option></select></label>
        <label>Target text<select id="textTargetLanguage"><option value="vi">Vietnamese</option><option value="en">English</option><option value="ja">Japanese</option><option value="ko">Korean</option><option value="zh">Chinese</option></select></label>
      </section>
      <section class="card image-section"><div class="section-heading"><h2>Images on current page</h2><span id="imageCount">0 images</span></div><div id="imageList" class="image-list"></div></section>
      <section class="card"><h2>Quality</h2><div id="quality" class="metrics"></div></section>
      <section class="card"><h2>Image counters</h2><div id="scopes" class="scope-cards"></div></section>
      <section class="card blacklist-panel"><h2>AI blacklist</h2><div id="blacklist"></div></section>
    </main>
    <script src="src/dashboard.js"></script>
  </body>
</html>
