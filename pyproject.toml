[tool.pytest.ini_options]
testpaths = ["backend/tests"]
pythonpath = ["backend"]
asyncio_default_fixture_loop_scope = "function"
addopts = ["--strict-config", "--strict-markers", "-p", "no:cacheprovider"]

[tool.coverage.run]
branch = true
source = ["backend/app"]

[tool.coverage.report]
show_missing = true
skip_covered = true
exclude_also = [
  "if TYPE_CHECKING:",
  "raise NotImplementedError",
]

[tool.ruff]
target-version = "py312"
line-length = 120
extend-exclude = [".venv", "backend/cache", "backend/models"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "ASYNC"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"backend/app/api/routes.py" = ["B008"]
"backend/tests/*" = ["ASYNC110"]
